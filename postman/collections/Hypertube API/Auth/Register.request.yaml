$kind: http-request
name: Register
url: '{{baseUrl}}/api/v1/auth/register'
method: POST
header:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "username": "testuser",
      "email": "testuser@example.com",
      "password": "Password123!",
      "first_name": "Test",
      "last_name": "User"
    }
order: 1000
